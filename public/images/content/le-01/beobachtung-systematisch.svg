<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" style="font-family:'Poppins',sans-serif">
  <rect width="600" height="340" fill="#fafaf9"/>

  <text x="300" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#33302b" opacity="0.35" letter-spacing="0.1em">SYSTEMATISCHE BEOBACHTUNG — 4 GRUNDSÄTZE</text>

  <!-- Center element -->
  <circle cx="300" cy="170" r="52" fill="#7A816C" opacity="0.08" stroke="#7A816C" stroke-width="1.5"/>
  <text x="300" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#7A816C">Systematische</text>
  <text x="300" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#7A816C">Beobachtung</text>

  <!-- Top: Geplant -->
  <line x1="300" y1="118" x2="300" y2="72" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <rect x="212" y="42" width="176" height="32" rx="10" fill="#E5DFD6" stroke="#33302b" stroke-width="0.4" stroke-opacity="0.1"/>
  <text x="300" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#33302b">Geplant</text>

  <!-- Right: Strukturiert -->
  <line x1="352" y1="170" x2="408" y2="170" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <rect x="408" y="134" width="176" height="72" rx="10" fill="#E5DFD6" stroke="#33302b" stroke-width="0.4" stroke-opacity="0.1"/>
  <text x="496" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#33302b">Strukturiert</text>
  <text x="496" y="174" text-anchor="middle" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.5">Alle Sinne nutzen:</text>
  <text x="496" y="188" text-anchor="middle" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.5">Sehen · Hören · Riechen · Tasten</text>

  <!-- Bottom: Dokumentiert -->
  <line x1="300" y1="222" x2="300" y2="270" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <rect x="212" y="270" width="176" height="32" rx="10" fill="#E5DFD6" stroke="#33302b" stroke-width="0.4" stroke-opacity="0.1"/>
  <text x="300" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#33302b">Dokumentiert</text>

  <!-- Left: Verglichen -->
  <line x1="248" y1="170" x2="192" y2="170" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <rect x="16" y="146" width="176" height="48" rx="10" fill="#E5DFD6" stroke="#33302b" stroke-width="0.4" stroke-opacity="0.1"/>
  <text x="104" y="167" text-anchor="middle" font-size="11" font-weight="600" fill="#33302b">Verglichen</text>
  <text x="104" y="182" text-anchor="middle" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.5">Veränderungen erkennen</text>

  <!-- Bottom note -->
  <rect x="150" y="314" width="300" height="20" rx="10" fill="#AE6965" opacity="0.08"/>
  <text x="300" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#AE6965">Eine gute Beobachtung kann Leben retten.</text>
</svg>
