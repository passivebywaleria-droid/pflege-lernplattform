<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Peplau 4 Phasen der Pflegebeziehung als Timeline">
  <style>
    text { font-family: 'Poppins', sans-serif; }
  </style>

  <!-- Title -->
  <text x="180" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Peplau: 4 Phasen der Pflegebeziehung</text>

  <!-- Timeline Line -->
  <line x1="30" y1="80" x2="330" y2="80" stroke="#E5DFD6" stroke-width="3" stroke-linecap="round"/>

  <!-- Phase 1: Orientierung -->
  <circle cx="60" cy="80" r="14" fill="#7A816C"/>
  <text x="60" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#fafaf9">1</text>
  <text x="60" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#7A816C">Orientierung</text>
  <rect x="18" y="118" width="84" height="38" rx="6" fill="#7A816C" opacity="0.08"/>
  <text x="60" y="134" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Kennenlernen</text>
  <text x="60" y="148" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Problem erkennen</text>

  <!-- Arrow 1→2 -->
  <line x1="78" y1="80" x2="136" y2="80" stroke="#D1A9A5" stroke-width="2"/>
  <polygon points="138,80 130,75 130,85" fill="#D1A9A5"/>

  <!-- Phase 2: Identifikation -->
  <circle cx="150" cy="80" r="14" fill="#AE6965"/>
  <text x="150" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#fafaf9">2</text>
  <text x="150" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#AE6965">Identifikation</text>
  <rect x="108" y="118" width="84" height="38" rx="6" fill="#AE6965" opacity="0.08"/>
  <text x="150" y="134" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Vertrauen</text>
  <text x="150" y="148" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Beziehung aufbauen</text>

  <!-- Arrow 2→3 -->
  <line x1="168" y1="80" x2="226" y2="80" stroke="#D1A9A5" stroke-width="2"/>
  <polygon points="228,80 220,75 220,85" fill="#D1A9A5"/>

  <!-- Phase 3: Nutzung -->
  <circle cx="240" cy="80" r="14" fill="#A58B71"/>
  <text x="240" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#fafaf9">3</text>
  <text x="240" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#A58B71">Nutzung</text>
  <rect x="198" y="118" width="84" height="38" rx="6" fill="#A58B71" opacity="0.08"/>
  <text x="240" y="134" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Zusammenarbeit</text>
  <text x="240" y="148" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Hilfe annehmen</text>

  <!-- Arrow 3→4 -->
  <line x1="258" y1="80" x2="316" y2="80" stroke="#D1A9A5" stroke-width="2"/>
  <polygon points="318,80 310,75 310,85" fill="#D1A9A5"/>

  <!-- Phase 4: Ablösung -->
  <circle cx="330" cy="80" r="14" fill="#D1A9A5"/>
  <text x="330" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">4</text>
  <text x="330" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#AE6965">Ablösung</text>
  <rect x="288" y="118" width="84" height="38" rx="6" fill="#D1A9A5" opacity="0.15"/>
  <text x="330" y="134" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Abschied</text>
  <text x="330" y="148" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)">Selbstständigkeit</text>

  <!-- Gradient bar underneath -->
  <defs>
    <linearGradient id="phaseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A816C"/>
      <stop offset="33%" stop-color="#AE6965"/>
      <stop offset="66%" stop-color="#A58B71"/>
      <stop offset="100%" stop-color="#D1A9A5"/>
    </linearGradient>
  </defs>
  <rect x="30" y="170" width="300" height="4" rx="2" fill="url(#phaseGrad)" opacity="0.5"/>

  <!-- Labels -->
  <text x="60" y="190" text-anchor="middle" font-size="9" fill="#7A816C">Beginn</text>
  <text x="330" y="190" text-anchor="middle" font-size="9" fill="#AE6965">Ende</text>
  <text x="180" y="210" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)" opacity="0.5">Hildegard Peplau, 1952</text>
</svg>