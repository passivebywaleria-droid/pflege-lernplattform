<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="font-family:'Poppins',sans-serif">
  <rect width="600" height="300" fill="#fafaf9"/>

  <text x="300" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#33302b" opacity="0.35" letter-spacing="0.1em">5 TEAMPHASEN NACH TUCKMAN</text>

  <!-- Timeline base line -->
  <line x1="40" y1="180" x2="560" y2="180" stroke="#E5DFD6" stroke-width="2"/>

  <!-- Performance curve -->
  <path d="M60,160 Q120,170 170,165 Q200,190 230,175 Q280,130 340,100 Q400,80 450,70 Q500,68 540,90"
        fill="none" stroke="#7A816C" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Phase 1: Forming -->
  <circle cx="80" cy="180" r="5" fill="#7A816C"/>
  <rect x="30" y="58" width="100" height="68" rx="8" fill="#E5DFD6" opacity="0.5" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="80" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#7A816C">Forming</text>
  <text x="80" y="93" text-anchor="middle" font-size="8" font-weight="500" fill="#33302b" opacity="0.5">Orientierung</text>
  <text x="80" y="108" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Kennenlernen,</text>
  <text x="80" y="118" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Unsicherheit</text>
  <line x1="80" y1="126" x2="80" y2="175" stroke="#33302b" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Phase 2: Storming -->
  <circle cx="190" cy="180" r="5" fill="#AE6965"/>
  <rect x="140" y="58" width="100" height="68" rx="8" fill="#AE6965" opacity="0.05" stroke="#AE6965" stroke-width="0.8"/>
  <text x="190" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#AE6965">Storming</text>
  <text x="190" y="93" text-anchor="middle" font-size="8" font-weight="500" fill="#33302b" opacity="0.5">Konflikte</text>
  <text x="190" y="108" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Machtkämpfe,</text>
  <text x="190" y="118" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Reibung</text>
  <line x1="190" y1="126" x2="190" y2="175" stroke="#33302b" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Phase 3: Norming -->
  <circle cx="310" cy="180" r="5" fill="#A58B71"/>
  <rect x="260" y="58" width="100" height="68" rx="8" fill="#E5DFD6" opacity="0.5" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="310" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#A58B71">Norming</text>
  <text x="310" y="93" text-anchor="middle" font-size="8" font-weight="500" fill="#33302b" opacity="0.5">Regeln finden</text>
  <text x="310" y="108" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Zusammenarbeit,</text>
  <text x="310" y="118" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Vertrauen wächst</text>
  <line x1="310" y1="126" x2="310" y2="175" stroke="#33302b" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Phase 4: Performing -->
  <circle cx="420" cy="180" r="5" fill="#7A816C"/>
  <rect x="370" y="48" width="100" height="74" rx="8" fill="#7A816C" opacity="0.06" stroke="#7A816C" stroke-width="1"/>
  <text x="420" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#7A816C">Performing</text>
  <text x="420" y="83" text-anchor="middle" font-size="8" font-weight="500" fill="#33302b" opacity="0.5">Höchstleistung</text>
  <text x="420" y="98" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Effektiv, produktiv,</text>
  <text x="420" y="108" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">gemeinsame Ziele</text>
  <line x1="420" y1="122" x2="420" y2="175" stroke="#33302b" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Phase 5: Adjourning -->
  <circle cx="530" cy="180" r="5" fill="#D1A9A5"/>
  <rect x="480" y="58" width="100" height="68" rx="8" fill="#E5DFD6" opacity="0.5" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="530" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#D1A9A5">Adjourning</text>
  <text x="530" y="93" text-anchor="middle" font-size="8" font-weight="500" fill="#33302b" opacity="0.5">Auflösung</text>
  <text x="530" y="108" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Abschied,</text>
  <text x="530" y="118" text-anchor="middle" font-size="7.5" font-weight="400" fill="#33302b" opacity="0.4">Reflexion</text>
  <line x1="530" y1="126" x2="530" y2="175" stroke="#33302b" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Labels under timeline -->
  <text x="80" y="200" text-anchor="middle" font-size="7" font-weight="500" fill="#33302b" opacity="0.3">Phase 1</text>
  <text x="190" y="200" text-anchor="middle" font-size="7" font-weight="500" fill="#33302b" opacity="0.3">Phase 2</text>
  <text x="310" y="200" text-anchor="middle" font-size="7" font-weight="500" fill="#33302b" opacity="0.3">Phase 3</text>
  <text x="420" y="200" text-anchor="middle" font-size="7" font-weight="500" fill="#33302b" opacity="0.3">Phase 4</text>
  <text x="530" y="200" text-anchor="middle" font-size="7" font-weight="500" fill="#33302b" opacity="0.3">Phase 5</text>

  <!-- Arrows between phases -->
  <path d="M95,180 L175,180" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <path d="M205,180 L295,180" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <path d="M325,180 L405,180" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>
  <path d="M435,180 L515,180" stroke="#33302b" stroke-width="0.6" stroke-opacity="0.12"/>

  <!-- Bottom note -->
  <text x="300" y="232" text-anchor="middle" font-size="9" font-weight="500" fill="#33302b" opacity="0.3">Jedes Pflegeteam durchläuft diese Phasen — auch auf Station</text>

  <!-- Performance label -->
  <text x="560" y="66" font-size="7" font-weight="500" fill="#7A816C" opacity="0.4">Leistung ↑</text>
</svg>
