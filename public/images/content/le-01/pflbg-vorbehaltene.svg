<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" style="font-family:'Poppins',sans-serif">
  <rect width="600" height="340" fill="#fafaf9"/>

  <text x="300" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#33302b" opacity="0.35" letter-spacing="0.1em">PflBG §4 — VORBEHALTENE TÄTIGKEITEN &amp; ICN-ETHIKKODEX</text>

  <!-- Left: Vorbehaltene Tätigkeiten -->
  <rect x="20" y="48" width="280" height="240" rx="12" fill="#E5DFD6" opacity="0.4"/>
  <rect x="20" y="48" width="280" height="42" rx="12" fill="#7A816C" opacity="0.1"/>
  <rect x="20" y="84" width="280" height="1" fill="#7A816C" opacity="0.12"/>
  <text x="36" y="74" font-size="11" font-weight="700" fill="#7A816C">Vorbehaltene Tätigkeiten</text>

  <text x="36" y="106" font-size="8.5" font-weight="500" fill="#33302b" opacity="0.45">Nur Pflegefachkräfte dürfen:</text>

  <!-- Activity 1 -->
  <rect x="36" y="118" width="248" height="38" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="54" cy="137" r="10" fill="#7A816C" opacity="0.12"/>
  <text x="54" y="141" text-anchor="middle" font-size="9" font-weight="700" fill="#7A816C">1</text>
  <text x="72" y="134" font-size="9.5" font-weight="600" fill="#33302b">Pflegebedarf</text>
  <text x="72" y="148" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.55">erheben und feststellen</text>

  <!-- Activity 2 -->
  <rect x="36" y="164" width="248" height="38" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="54" cy="183" r="10" fill="#7A816C" opacity="0.12"/>
  <text x="54" y="187" text-anchor="middle" font-size="9" font-weight="700" fill="#7A816C">2</text>
  <text x="72" y="180" font-size="9.5" font-weight="600" fill="#33302b">Pflegeprozess</text>
  <text x="72" y="194" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.55">organisieren und steuern</text>

  <!-- Activity 3 -->
  <rect x="36" y="210" width="248" height="38" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="54" cy="229" r="10" fill="#7A816C" opacity="0.12"/>
  <text x="54" y="233" text-anchor="middle" font-size="9" font-weight="700" fill="#7A816C">3</text>
  <text x="72" y="226" font-size="9.5" font-weight="600" fill="#33302b">Pflegequalität</text>
  <text x="72" y="240" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.55">sichern und entwickeln</text>

  <rect x="36" y="260" width="248" height="20" rx="6" fill="#AE6965" opacity="0.06"/>
  <text x="160" y="274" text-anchor="middle" font-size="8" font-weight="600" fill="#AE6965">Nicht delegierbar an Pflegehelfer</text>

  <!-- Right: ICN-Ethikkodex -->
  <rect x="320" y="48" width="260" height="240" rx="12" fill="#E5DFD6" opacity="0.4"/>
  <rect x="320" y="48" width="260" height="42" rx="12" fill="#AE6965" opacity="0.08"/>
  <rect x="320" y="84" width="260" height="1" fill="#AE6965" opacity="0.12"/>
  <text x="336" y="74" font-size="11" font-weight="700" fill="#AE6965">ICN-Ethikkodex</text>

  <text x="336" y="106" font-size="8.5" font-weight="500" fill="#33302b" opacity="0.45">Verhaltensnormen seit 1953 in 4 Bereichen:</text>

  <!-- 4 Areas -->
  <rect x="336" y="118" width="228" height="32" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="352" y="139" font-size="9.5" font-weight="600" fill="#33302b">Gegenüber Mitmenschen</text>

  <rect x="336" y="158" width="228" height="32" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="352" y="179" font-size="9.5" font-weight="600" fill="#33302b">In der Berufsausübung</text>

  <rect x="336" y="198" width="228" height="32" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="352" y="219" font-size="9.5" font-weight="600" fill="#33302b">Gegenüber der Profession</text>

  <rect x="336" y="238" width="228" height="32" rx="8" fill="#fafaf9" stroke="#33302b" stroke-width="0.3" stroke-opacity="0.1"/>
  <text x="352" y="259" font-size="9.5" font-weight="600" fill="#33302b">Gegenüber Kolleg:innen</text>

  <!-- Bottom -->
  <text x="300" y="310" text-anchor="middle" font-size="9" font-weight="500" fill="#33302b" opacity="0.3">Als Pflegefachkraft trägst du besondere Verantwortung — rechtlich und ethisch</text>
</svg>
