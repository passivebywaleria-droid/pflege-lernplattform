<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" role="img" aria-label="Evidence-Based Nursing 6-Schritte-Modell als Kausalkette">
  <style>
    text { font-family: 'Poppins', sans-serif; }
  </style>

  <!-- Title -->
  <text x="180" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">EBN: 6-Schritte-Modell</text>

  <!-- Row 1: Steps 1-3 -->
  <!-- Step 1 -->
  <rect x="12" y="42" width="100" height="56" rx="8" fill="#7A816C" opacity="0.12"/>
  <rect x="12" y="42" width="100" height="56" rx="8" fill="none" stroke="#7A816C" stroke-width="1.5"/>
  <circle cx="28" cy="54" r="9" fill="#7A816C"/>
  <text x="28" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#fafaf9">1</text>
  <text x="62" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Frage</text>
  <text x="62" y="80" text-anchor="middle" font-size="9" fill="#7A816C">formulieren</text>
  <text x="62" y="92" text-anchor="middle" font-size="9" fill="#7A816C">(PIKO-Schema)</text>

  <!-- Arrow 1→2 -->
  <path d="M112,70 L122,70" stroke="#AE6965" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- Step 2 -->
  <rect x="130" y="42" width="100" height="56" rx="8" fill="#AE6965" opacity="0.12"/>
  <rect x="130" y="42" width="100" height="56" rx="8" fill="none" stroke="#AE6965" stroke-width="1.5"/>
  <circle cx="146" cy="54" r="9" fill="#AE6965"/>
  <text x="146" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#fafaf9">2</text>
  <text x="180" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Literatur</text>
  <text x="180" y="80" text-anchor="middle" font-size="9" fill="#AE6965">suchen</text>
  <text x="180" y="92" text-anchor="middle" font-size="9" fill="#AE6965">(Datenbanken)</text>

  <!-- Arrow 2→3 -->
  <path d="M230,70 L240,70" stroke="#A58B71" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- Step 3 -->
  <rect x="248" y="42" width="100" height="56" rx="8" fill="#A58B71" opacity="0.12"/>
  <rect x="248" y="42" width="100" height="56" rx="8" fill="none" stroke="#A58B71" stroke-width="1.5"/>
  <circle cx="264" cy="54" r="9" fill="#A58B71"/>
  <text x="264" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#fafaf9">3</text>
  <text x="298" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Kritisch</text>
  <text x="298" y="80" text-anchor="middle" font-size="9" fill="#A58B71">bewerten</text>
  <text x="298" y="92" text-anchor="middle" font-size="9" fill="#A58B71">(Evidenzlevel)</text>

  <!-- Connector 3→4 (down-turn) -->
  <path d="M298,98 L298,112 L62,112 L62,126" stroke="#D1A9A5" stroke-width="2" fill="none" stroke-dasharray="4 3"/>

  <!-- Row 2: Steps 4-6 (reversed direction) -->
  <!-- Step 4 -->
  <rect x="12" y="120" width="100" height="56" rx="8" fill="#D1A9A5" opacity="0.15"/>
  <rect x="12" y="120" width="100" height="56" rx="8" fill="none" stroke="#D1A9A5" stroke-width="1.5"/>
  <circle cx="28" cy="132" r="9" fill="#D1A9A5"/>
  <text x="28" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">4</text>
  <text x="62" y="144" text-anchor="middle" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Umsetzen</text>
  <text x="62" y="158" text-anchor="middle" font-size="9" fill="#AE6965">in die Praxis</text>
  <text x="62" y="170" text-anchor="middle" font-size="9" fill="#AE6965">übertragen</text>

  <!-- Arrow 4→5 -->
  <path d="M112,148 L122,148" stroke="#7A816C" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- Step 5 -->
  <rect x="130" y="120" width="100" height="56" rx="8" fill="#7A816C" opacity="0.08"/>
  <rect x="130" y="120" width="100" height="56" rx="8" fill="none" stroke="#7A816C" stroke-width="1.5"/>
  <circle cx="146" cy="132" r="9" fill="#7A816C"/>
  <text x="146" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#fafaf9">5</text>
  <text x="180" y="144" text-anchor="middle" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Anpassen</text>
  <text x="180" y="158" text-anchor="middle" font-size="9" fill="#7A816C">an Patient &amp;</text>
  <text x="180" y="170" text-anchor="middle" font-size="9" fill="#7A816C">Situation</text>

  <!-- Arrow 5→6 -->
  <path d="M230,148 L240,148" stroke="#AE6965" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>

  <!-- Step 6 -->
  <rect x="248" y="120" width="100" height="56" rx="8" fill="#AE6965" opacity="0.08"/>
  <rect x="248" y="120" width="100" height="56" rx="8" fill="none" stroke="#AE6965" stroke-width="1.5"/>
  <circle cx="264" cy="132" r="9" fill="#AE6965"/>
  <text x="264" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#fafaf9">6</text>
  <text x="298" y="144" text-anchor="middle" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Evaluieren</text>
  <text x="298" y="158" text-anchor="middle" font-size="9" fill="#AE6965">Wirksamkeit</text>
  <text x="298" y="170" text-anchor="middle" font-size="9" fill="#AE6965">prüfen</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L6,4 L0,8" fill="none" stroke="#33302b" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="180" y="194" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)" opacity="0.4">nach Behrens &amp; Langer, 2004</text>
</svg>