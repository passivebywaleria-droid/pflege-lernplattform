<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="font-family:'Poppins',sans-serif">
  <rect width="600" height="300" fill="#fafaf9"/>

  <text x="300" y="28" text-anchor="middle" font-size="10" font-weight="600" fill="#33302b" opacity="0.35" letter-spacing="0.1em">ETHISCHE PRINZIPIEN IN DER PRAXIS</text>

  <!-- Table header -->
  <rect x="20" y="48" width="560" height="36" rx="10" fill="#E5DFD6" opacity="0.5"/>
  <text x="46" y="71" font-size="9" font-weight="600" fill="#33302b" opacity="0.5">SITUATION</text>
  <text x="260" y="71" font-size="9" font-weight="600" fill="#33302b" opacity="0.5">LEITENDES PRINZIP</text>
  <text x="430" y="71" font-size="9" font-weight="600" fill="#33302b" opacity="0.5">PFLEGERISCHES HANDELN</text>

  <!-- Row A -->
  <rect x="20" y="92" width="560" height="82" rx="10" fill="#7A816C" opacity="0.04" stroke="#7A816C" stroke-width="0.8"/>

  <text x="36" y="115" font-size="10" font-weight="600" fill="#33302b">Situation A</text>
  <text x="36" y="130" font-size="9" font-weight="400" fill="#33302b" opacity="0.6">Patient lehnt</text>
  <text x="36" y="143" font-size="9" font-weight="400" fill="#33302b" opacity="0.6">Körperpflege ab</text>

  <line x1="230" y1="102" x2="230" y2="164" stroke="#E5DFD6" stroke-width="1"/>

  <rect x="244" y="108" width="100" height="28" rx="8" fill="#7A816C" opacity="0.1" stroke="#7A816C" stroke-width="1"/>
  <text x="294" y="127" text-anchor="middle" font-size="10" font-weight="700" fill="#7A816C">Autonomie</text>
  <text x="260" y="152" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.5">Selbstbestimmung respektieren</text>

  <line x1="400" y1="102" x2="400" y2="164" stroke="#E5DFD6" stroke-width="1"/>

  <text x="416" y="118" font-size="9" font-weight="500" fill="#33302b" opacity="0.7">Alternative organisieren,</text>
  <text x="416" y="132" font-size="9" font-weight="500" fill="#33302b" opacity="0.7">Wunsch respektieren,</text>
  <text x="416" y="146" font-size="9" font-weight="500" fill="#33302b" opacity="0.7">dokumentieren</text>

  <!-- Row B -->
  <rect x="20" y="186" width="560" height="82" rx="10" fill="#AE6965" opacity="0.04" stroke="#AE6965" stroke-width="0.8"/>

  <text x="36" y="209" font-size="10" font-weight="600" fill="#33302b">Situation B</text>
  <text x="36" y="224" font-size="9" font-weight="400" fill="#33302b" opacity="0.6">Patient hat Schmerzen,</text>
  <text x="36" y="237" font-size="9" font-weight="400" fill="#33302b" opacity="0.6">sagt aber nichts</text>

  <line x1="230" y1="196" x2="230" y2="258" stroke="#E5DFD6" stroke-width="1"/>

  <rect x="244" y="202" width="100" height="28" rx="8" fill="#AE6965" opacity="0.1" stroke="#AE6965" stroke-width="1"/>
  <text x="294" y="221" text-anchor="middle" font-size="10" font-weight="700" fill="#AE6965">Benefizienz</text>
  <text x="260" y="246" font-size="8.5" font-weight="400" fill="#33302b" opacity="0.5">Aktiv Wohlbefinden fördern</text>

  <line x1="400" y1="196" x2="400" y2="258" stroke="#E5DFD6" stroke-width="1"/>

  <text x="416" y="212" font-size="9" font-weight="500" fill="#33302b" opacity="0.7">Beobachten, Schmerz-</text>
  <text x="416" y="226" font-size="9" font-weight="500" fill="#33302b" opacity="0.7">assessment durchführen,</text>
  <text x="416" y="240" font-size="9" font-weight="500" fill="#33302b" opacity="0.7">Arzt informieren</text>

  <!-- Bottom note -->
  <text x="300" y="290" text-anchor="middle" font-size="9" font-weight="500" fill="#33302b" opacity="0.3">Gleiche Prinzipien — aber welches Vorrang hat, hängt von der Situation ab</text>
</svg>
