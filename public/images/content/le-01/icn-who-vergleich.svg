<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" fill="none">

  <!-- Title -->
  <text x="180" y="32" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Pflege-Definitionen im Vergleich</text>

  <!-- Left Panel: ICN -->
  <rect x="16" y="52" width="156" height="148" rx="12" fill="#E5DFD6" stroke="#7A816C" stroke-width="1.5"/>
  <rect x="16" y="52" width="156" height="36" rx="12" fill="#7A816C"/>
  <rect x="16" y="76" width="156" height="12" fill="#7A816C"/>
  <text x="94" y="76" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#fafaf9">ICN</text>
  <text x="94" y="110" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Eigenverantwortliche</text>
  <text x="94" y="126" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Versorgung und</text>
  <text x="94" y="142" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Betreuung aller</text>
  <text x="94" y="158" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Menschen in allen</text>
  <text x="94" y="174" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Lebensphasen</text>
  <!-- Focus icon -->
  <circle cx="94" cy="190" r="4" fill="#7A816C" opacity="0.4"/>

  <!-- Right Panel: WHO -->
  <rect x="188" y="52" width="156" height="148" rx="12" fill="#E5DFD6" stroke="#AE6965" stroke-width="1.5"/>
  <rect x="188" y="52" width="156" height="36" rx="12" fill="#AE6965"/>
  <rect x="188" y="76" width="156" height="12" fill="#AE6965"/>
  <text x="266" y="76" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="#fafaf9">WHO</text>
  <text x="266" y="110" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Physisches,</text>
  <text x="266" y="126" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">psychisches und</text>
  <text x="266" y="142" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">soziales Potenzial</text>
  <text x="266" y="158" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">aller Menschen</text>
  <text x="266" y="174" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">voll ausschöpfen</text>
  <!-- Focus icon -->
  <circle cx="266" cy="190" r="4" fill="#AE6965" opacity="0.4"/>

  <!-- VS divider -->
  <circle cx="180" cy="126" r="16" fill="var(--lern-text-primary, #1d1d1f)"/>
  <text x="180" y="131" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="700" fill="#fafaf9">VS</text>

  <!-- Bottom: Gemeinsamkeit -->
  <rect x="16" y="216" width="328" height="48" rx="10" fill="#D1A9A5" opacity="0.3" stroke="#D1A9A5" stroke-width="1"/>
  <text x="180" y="237" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Gemeinsam:</text>
  <text x="180" y="254" text-anchor="middle" font-family="Poppins, sans-serif" font-size="12" fill="var(--lern-text-primary, #1d1d1f)">Gesundheitsförderung + Prävention</text>
</svg>