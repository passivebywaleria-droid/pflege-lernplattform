<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="none">

  <!-- Title -->
  <text x="180" y="30" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">4 ethische Prinzipien</text>
  <text x="180" y="48" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#A58B71">nach Beauchamp &amp; Childress</text>

  <!-- Cell 1: Autonomie (top-left) -->
  <rect x="16" y="64" width="158" height="112" rx="12" fill="#7A816C" opacity="0.12"/>
  <rect x="16" y="64" width="158" height="112" rx="12" fill="none" stroke="#7A816C" stroke-width="1.5"/>
  <rect x="28" y="76" width="36" height="36" rx="18" fill="#7A816C"/>
  <text x="46" y="100" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" fill="#fafaf9">A</text>
  <text x="78" y="92" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Autonomie</text>
  <text x="78" y="106" font-family="Poppins, sans-serif" font-size="10" fill="#7A816C">lat. autonomia</text>
  <line x1="28" y1="120" x2="162" y2="120" stroke="#7A816C" stroke-width="0.5" opacity="0.3"/>
  <text x="28" y="138" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Patient entscheidet</text>
  <text x="28" y="154" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">selbst über</text>
  <text x="28" y="168" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">seine Behandlung.</text>

  <!-- Cell 2: Fürsorge (top-right) -->
  <rect x="186" y="64" width="158" height="112" rx="12" fill="#AE6965" opacity="0.12"/>
  <rect x="186" y="64" width="158" height="112" rx="12" fill="none" stroke="#AE6965" stroke-width="1.5"/>
  <rect x="198" y="76" width="36" height="36" rx="18" fill="#AE6965"/>
  <text x="216" y="100" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" fill="#fafaf9">F</text>
  <text x="248" y="92" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Fürsorge</text>
  <text x="248" y="106" font-family="Poppins, sans-serif" font-size="10" fill="#AE6965">beneficence</text>
  <line x1="198" y1="120" x2="332" y2="120" stroke="#AE6965" stroke-width="0.5" opacity="0.3"/>
  <text x="198" y="138" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Handeln zum</text>
  <text x="198" y="154" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Wohl des</text>
  <text x="198" y="168" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Patienten.</text>

  <!-- Cell 3: Schadensvermeidung (bottom-left) -->
  <rect x="16" y="188" width="158" height="112" rx="12" fill="#A58B71" opacity="0.12"/>
  <rect x="16" y="188" width="158" height="112" rx="12" fill="none" stroke="#A58B71" stroke-width="1.5"/>
  <rect x="28" y="200" width="36" height="36" rx="18" fill="#A58B71"/>
  <text x="46" y="224" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" fill="#fafaf9">S</text>
  <text x="78" y="212" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Schadens-</text>
  <text x="78" y="226" font-family="Poppins, sans-serif" font-size="12" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">vermeidung</text>
  <line x1="28" y1="238" x2="162" y2="238" stroke="#A58B71" stroke-width="0.5" opacity="0.3"/>
  <text x="28" y="256" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Keinen Schaden</text>
  <text x="28" y="272" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">zufügen.</text>
  <text x="28" y="288" font-family="Poppins, sans-serif" font-size="10" fill="#A58B71" font-style="italic">non-maleficence</text>

  <!-- Cell 4: Gerechtigkeit (bottom-right) -->
  <rect x="186" y="188" width="158" height="112" rx="12" fill="#D1A9A5" opacity="0.2"/>
  <rect x="186" y="188" width="158" height="112" rx="12" fill="none" stroke="#D1A9A5" stroke-width="1.5"/>
  <rect x="198" y="200" width="36" height="36" rx="18" fill="#D1A9A5"/>
  <text x="216" y="224" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" fill="var(--lern-text-primary, #1d1d1f)">G</text>
  <text x="248" y="216" font-family="Poppins, sans-serif" font-size="13" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Gerechtigkeit</text>
  <line x1="198" y1="238" x2="332" y2="238" stroke="#D1A9A5" stroke-width="0.5" opacity="0.3"/>
  <text x="198" y="256" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">Gleiche Behandlung</text>
  <text x="198" y="272" font-family="Poppins, sans-serif" font-size="11.5" fill="var(--lern-text-primary, #1d1d1f)">für alle.</text>
  <text x="198" y="288" font-family="Poppins, sans-serif" font-size="10" fill="#D1A9A5" font-style="italic">justice</text>
</svg>