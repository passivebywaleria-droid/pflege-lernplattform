<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="Kulturelle Kompetenz mit 4 Aspekten als Kompass-Layout">
  <style>
    text { font-family: 'Poppins', sans-serif; }
  </style>

  <!-- Title -->
  <text x="180" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Kulturelle Kompetenz in der Pflege</text>

  <!-- Center Circle -->
  <circle cx="180" cy="190" r="44" fill="#A58B71" opacity="0.15"/>
  <circle cx="180" cy="190" r="44" fill="none" stroke="#A58B71" stroke-width="2"/>
  <text x="180" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Kulturelle</text>
  <text x="180" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Kompetenz</text>

  <!-- Connecting lines (behind cards) -->
  <line x1="180" y1="146" x2="180" y2="100" stroke="#E5DFD6" stroke-width="2"/>
  <line x1="180" y1="234" x2="180" y2="278" stroke="#E5DFD6" stroke-width="2"/>
  <line x1="136" y1="190" x2="26" y2="190" stroke="#E5DFD6" stroke-width="2"/>
  <line x1="224" y1="190" x2="334" y2="190" stroke="#E5DFD6" stroke-width="2"/>

  <!-- Top: Bewusstsein -->
  <rect x="115" y="46" width="130" height="54" rx="10" fill="#7A816C" opacity="0.1"/>
  <rect x="115" y="46" width="130" height="54" rx="10" fill="none" stroke="#7A816C" stroke-width="1.5"/>
  <circle cx="136" cy="64" r="10" fill="#7A816C"/>
  <text x="136" y="68" text-anchor="middle" font-size="12" fill="#fafaf9">&#x2729;</text>
  <text x="190" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Bewusstsein</text>
  <text x="180" y="86" text-anchor="middle" font-size="10" fill="#7A816C">Eigene Kultur reflektieren</text>

  <!-- Bottom: Begegnung -->
  <rect x="115" y="278" width="130" height="54" rx="10" fill="#D1A9A5" opacity="0.15"/>
  <rect x="115" y="278" width="130" height="54" rx="10" fill="none" stroke="#D1A9A5" stroke-width="1.5"/>
  <circle cx="136" cy="296" r="10" fill="#D1A9A5"/>
  <text x="136" y="300" text-anchor="middle" font-size="12" fill="var(--lern-text-primary, #1d1d1f)">&#x2665;</text>
  <text x="190" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Begegnung</text>
  <text x="180" y="320" text-anchor="middle" font-size="10" fill="#AE6965">Offen sein für andere</text>

  <!-- Left: Fähigkeiten -->
  <rect x="8" y="162" width="120" height="56" rx="10" fill="#AE6965" opacity="0.1"/>
  <rect x="8" y="162" width="120" height="56" rx="10" fill="none" stroke="#AE6965" stroke-width="1.5"/>
  <circle cx="28" cy="180" r="10" fill="#AE6965"/>
  <text x="28" y="184" text-anchor="middle" font-size="11" fill="#fafaf9">&#x270E;</text>
  <text x="72" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Fähigkeiten</text>
  <text x="68" y="200" text-anchor="middle" font-size="10" fill="#AE6965">Sensibel</text>
  <text x="68" y="212" text-anchor="middle" font-size="10" fill="#AE6965">handeln</text>

  <!-- Right: Wissen -->
  <rect x="232" y="162" width="120" height="56" rx="10" fill="#A58B71" opacity="0.1"/>
  <rect x="232" y="162" width="120" height="56" rx="10" fill="none" stroke="#A58B71" stroke-width="1.5"/>
  <circle cx="252" cy="180" r="10" fill="#A58B71"/>
  <text x="252" y="184" text-anchor="middle" font-size="11" fill="#fafaf9">&#x2691;</text>
  <text x="300" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Wissen</text>
  <text x="292" y="200" text-anchor="middle" font-size="10" fill="#A58B71">Andere Kulturen</text>
  <text x="292" y="212" text-anchor="middle" font-size="10" fill="#A58B71">kennenlernen</text>

  <!-- Decorative dots at compass points -->
  <circle cx="180" cy="143" r="4" fill="#7A816C"/>
  <circle cx="180" cy="237" r="4" fill="#D1A9A5"/>
  <circle cx="133" cy="190" r="4" fill="#AE6965"/>
  <circle cx="227" cy="190" r="4" fill="#A58B71"/>

  <!-- Footer -->
  <text x="180" y="350" text-anchor="middle" font-size="10" fill="var(--lern-text-primary, #1d1d1f)" opacity="0.4">nach Campinha-Bacote, 2002</text>
</svg>