<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" role="img" aria-label="Orem Selbstpflegedefizit-Modell mit konzentrischen Kreisen">
  <style>
    text { font-family: 'Poppins', sans-serif; }
  </style>

  <!-- Title -->
  <text x="180" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Orem: Selbstpflegedefizit-Modell</text>

  <!-- Outer Ring: Selbstpflegebedarf -->
  <circle cx="170" cy="170" r="120" fill="none" stroke="#AE6965" stroke-width="2.5" stroke-dasharray="8 4"/>
  <circle cx="170" cy="170" r="120" fill="#AE6965" opacity="0.08"/>
  <text x="170" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#AE6965">Selbstpflegebedarf</text>
  <text x="170" y="75" text-anchor="middle" font-size="10" fill="#AE6965">(Was gebraucht wird)</text>

  <!-- Middle Ring: Selbstpflegekompetenz -->
  <circle cx="170" cy="170" r="75" fill="none" stroke="#7A816C" stroke-width="2.5"/>
  <circle cx="170" cy="170" r="75" fill="#7A816C" opacity="0.1"/>
  <text x="170" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#7A816C">Selbstpflegekompetenz</text>
  <text x="170" y="121" text-anchor="middle" font-size="10" fill="#7A816C">(Was der Patient kann)</text>

  <!-- Inner Circle: Patient -->
  <circle cx="170" cy="170" r="35" fill="#A58B71" opacity="0.2"/>
  <circle cx="170" cy="170" r="35" fill="none" stroke="#A58B71" stroke-width="2"/>
  <text x="170" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Patient</text>
  <text x="170" y="182" text-anchor="middle" font-size="10" fill="#A58B71">Individuum</text>

  <!-- Gap Arrow: Bedarf > Kompetenz -->
  <line x1="295" y1="130" x2="295" y2="210" stroke="#AE6965" stroke-width="2"/>
  <polygon points="295,215 289,205 301,205" fill="#AE6965"/>
  <polygon points="295,125 289,135 301,135" fill="#AE6965"/>

  <!-- Gap Label -->
  <rect x="306" y="148" width="48" height="44" rx="6" fill="#AE6965" opacity="0.12"/>
  <text x="330" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#AE6965">Defizit</text>
  <text x="330" y="176" text-anchor="middle" font-size="9" fill="#AE6965">Bedarf</text>
  <text x="330" y="187" text-anchor="middle" font-size="9" fill="#AE6965">&gt; Können</text>

  <!-- Nurse Arrow -->
  <line x1="170" y1="250" x2="170" y2="300" stroke="#D1A9A5" stroke-width="2"/>
  <polygon points="170,248 164,258 176,258" fill="#D1A9A5"/>

  <!-- Nurse Label -->
  <rect x="110" y="278" width="120" height="30" rx="8" fill="#D1A9A5" opacity="0.25"/>
  <rect x="110" y="278" width="120" height="30" rx="8" fill="none" stroke="#D1A9A5" stroke-width="1.5"/>
  <text x="170" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#AE6965">Pflegekraft hilft</text>

  <!-- Key Insight -->
  <text x="55" y="270" text-anchor="middle" font-size="9" fill="#7A816C">Kompetenz</text>
  <text x="55" y="282" text-anchor="middle" font-size="9" fill="#7A816C">reicht</text>
  <rect x="30" y="287" width="50" height="16" rx="4" fill="#7A816C" opacity="0.15"/>
  <text x="55" y="299" text-anchor="middle" font-size="9" font-weight="600" fill="#7A816C">Kein Bedarf</text>
</svg>