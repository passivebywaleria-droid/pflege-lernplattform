<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" fill="none">

  <!-- Title -->
  <text x="180" y="26" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">Kommunikationskette im Team</text>

  <!-- Chain: 5 steps, 2 rows for mobile -->
  <!-- Row 1: Steps 1-3 -->

  <!-- Step 1 -->
  <rect x="12" y="48" width="96" height="44" rx="8" fill="#7A816C"/>
  <text x="60" y="66" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">Patient meldet</text>
  <text x="60" y="80" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">Problem</text>

  <!-- Arrow 1→2 -->
  <path d="M108 70 L122 70" stroke="#33302b" stroke-width="1.5" marker-end="url(#chain-arr)"/>

  <!-- Step 2 -->
  <rect x="132" y="48" width="96" height="44" rx="8" fill="#AE6965"/>
  <text x="180" y="66" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">Pflege</text>
  <text x="180" y="80" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">beobachtet</text>

  <!-- Arrow 2→3 -->
  <path d="M228 70 L242 70" stroke="#33302b" stroke-width="1.5" marker-end="url(#chain-arr)"/>

  <!-- Step 3 -->
  <rect x="252" y="48" width="96" height="44" rx="8" fill="#A58B71"/>
  <text x="300" y="66" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">Pflege</text>
  <text x="300" y="80" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">dokumentiert</text>

  <!-- Arrow 3→4 (down-left curve) -->
  <path d="M300 92 L300 106 Q300 114 292 114 L178 114" stroke="#33302b" stroke-width="1.5" fill="none" marker-end="url(#chain-arr)"/>

  <!-- Row 2: Steps 4-5 -->

  <!-- Step 4 -->
  <rect x="72" y="104" width="96" height="44" rx="8" fill="#D1A9A5"/>
  <text x="120" y="122" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">Arzt wird</text>
  <text x="120" y="136" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="var(--lern-text-primary, #1d1d1f)">informiert</text>

  <!-- Arrow 4→5 -->
  <path d="M72 126 L58 126" stroke="#33302b" stroke-width="1.5" fill="none"/>

  <!-- Step 5 (highlight) -->
  <rect x="192" y="104" width="156" height="44" rx="8" fill="var(--lern-text-primary, #1d1d1f)"/>
  <text x="270" y="122" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">Gemeinsame</text>
  <text x="270" y="136" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" font-weight="600" fill="#fafaf9">Entscheidung</text>

  <!-- Arrow 4→5 -->
  <path d="M168 126 L192 126" stroke="#33302b" stroke-width="1.5" marker-end="url(#chain-arr)"/>

  <!-- Step numbers -->
  <circle cx="22" cy="56" r="8" fill="#fafaf9" opacity="0.3"/>
  <text x="22" y="59" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" font-weight="700" fill="#fafaf9">1</text>
  <circle cx="142" cy="56" r="8" fill="#fafaf9" opacity="0.3"/>
  <text x="142" y="59" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" font-weight="700" fill="#fafaf9">2</text>
  <circle cx="262" cy="56" r="8" fill="#fafaf9" opacity="0.3"/>
  <text x="262" y="59" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" font-weight="700" fill="#fafaf9">3</text>
  <circle cx="82" cy="112" r="8" fill="#fafaf9" opacity="0.3"/>
  <text x="82" y="115" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" font-weight="700" fill="var(--lern-text-primary, #1d1d1f)">4</text>
  <circle cx="202" cy="112" r="8" fill="#fafaf9" opacity="0.3"/>
  <text x="202" y="115" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" font-weight="700" fill="#fafaf9">5</text>

  <!-- Footer -->
  <text x="180" y="168" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#A58B71" font-style="italic">Interdisziplinäre Zusammenarbeit im Pflegealltag</text>

  <defs>
    <marker id="chain-arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="var(--lern-text-primary, #1d1d1f)"/>
    </marker>
  </defs>
</svg>