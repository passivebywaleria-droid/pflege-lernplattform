<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f8f9fa"/>
  <!-- Epidermis (beschaedigt) -->
  <rect x="0" y="0" width="400" height="60" fill="#f5d0c5" stroke="#d4a090" stroke-width="1"/>
  <!-- Wundkrater -->
  <path d="M130 0 L130 20 Q150 60, 180 80 Q200 100, 220 80 Q250 60, 270 20 L270 0" fill="#f8f9fa" stroke="none"/>
  <path d="M130 20 Q150 60, 180 80 Q200 100, 220 80 Q250 60, 270 20" fill="#c0392b" stroke="#922b21" stroke-width="1.5"/>
  <!-- Nekrotisches Gewebe -->
  <ellipse cx="200" cy="65" rx="35" ry="15" fill="#4a1a1a" opacity="0.6"/>
  <text x="200" y="70" font-family="system-ui" font-size="8" fill="#fff" text-anchor="middle">Nekrose</text>
  <!-- Epidermis Label -->
  <text x="40" y="35" font-family="system-ui" font-size="11" fill="#8b5e3c" font-weight="600">Epidermis</text>
  <!-- Dermis (beschaedigt) -->
  <rect x="0" y="60" width="400" height="120" fill="#ffe0d0" stroke="#d4a090" stroke-width="1"/>
  <!-- Wunde reicht in Dermis -->
  <path d="M150 60 Q170 90, 185 100 Q200 110, 215 100 Q230 90, 250 60" fill="#e74c3c" opacity="0.3" stroke="#c0392b" stroke-width="1"/>
  <text x="40" y="120" font-family="system-ui" font-size="11" fill="#8b5e3c" font-weight="600">Dermis</text>
  <!-- Entzuendungszeichen -->
  <circle cx="160" cy="90" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="180" cy="95" r="4" fill="#e74c3c" opacity="0.4"/>
  <circle cx="220" cy="92" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="240" cy="88" r="4" fill="#e74c3c" opacity="0.4"/>
  <!-- Roetung um Wunde -->
  <ellipse cx="200" cy="50" rx="80" ry="25" fill="#e74c3c" opacity="0.15"/>
  <!-- Subcutis -->
  <rect x="0" y="180" width="400" height="120" fill="#fff3cd" stroke="#f0d090" stroke-width="1"/>
  <text x="40" y="245" font-family="system-ui" font-size="11" fill="#8b5e3c" font-weight="600">Subcutis</text>
  <!-- Fettzellen -->
  <circle cx="40" cy="220" r="18" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="80" cy="230" r="16" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="300" cy="218" r="19" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="345" cy="228" r="17" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <!-- Druck-Pfeil -->
  <path d="M200 290 L200 270" stroke="#c0392b" stroke-width="3" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c0392b"/>
    </marker>
  </defs>
  <text x="150" y="288" font-family="system-ui" font-size="10" fill="#c0392b" font-weight="600">Druck ↑</text>
  <!-- Grad IV Label -->
  <rect x="290" y="5" width="100" height="24" rx="12" fill="#c0392b"/>
  <text x="340" y="21" font-family="system-ui" font-size="11" fill="white" text-anchor="middle" font-weight="700">Grad IV</text>
  <!-- Titel -->
  <text x="10" y="295" font-family="system-ui" font-size="10" fill="#6e6e73">Dekubitus Grad IV — Querschnitt</text>
</svg>