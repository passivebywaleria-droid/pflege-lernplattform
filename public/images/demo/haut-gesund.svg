<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f8f9fa"/>
  <!-- Epidermis -->
  <rect x="0" y="0" width="400" height="60" fill="#f5d0c5" stroke="#d4a090" stroke-width="1"/>
  <text x="200" y="35" font-family="system-ui" font-size="13" fill="#8b5e3c" text-anchor="middle" font-weight="600">Epidermis</text>
  <!-- Epidermis Zellen -->
  <ellipse cx="50" cy="20" rx="20" ry="8" fill="#f0c4b5" stroke="#d4a090" stroke-width="0.5"/>
  <ellipse cx="100" cy="15" rx="22" ry="9" fill="#f0c4b5" stroke="#d4a090" stroke-width="0.5"/>
  <ellipse cx="160" cy="18" rx="18" ry="7" fill="#f0c4b5" stroke="#d4a090" stroke-width="0.5"/>
  <ellipse cx="280" cy="20" rx="20" ry="8" fill="#f0c4b5" stroke="#d4a090" stroke-width="0.5"/>
  <ellipse cx="340" cy="16" rx="22" ry="9" fill="#f0c4b5" stroke="#d4a090" stroke-width="0.5"/>
  <!-- Dermis -->
  <rect x="0" y="60" width="400" height="120" fill="#ffe0d0" stroke="#d4a090" stroke-width="1"/>
  <text x="200" y="125" font-family="system-ui" font-size="13" fill="#8b5e3c" text-anchor="middle" font-weight="600">Dermis</text>
  <!-- Blutgefaesse in Dermis -->
  <path d="M30 90 Q80 75, 130 90 Q180 105, 230 90 Q280 75, 330 90 Q360 100, 380 90" stroke="#e74c3c" stroke-width="2" fill="none"/>
  <path d="M30 100 Q80 115, 130 100 Q180 85, 230 100 Q280 115, 330 100 Q360 90, 380 100" stroke="#3498db" stroke-width="2" fill="none"/>
  <!-- Haarfollikel -->
  <rect x="80" y="40" width="4" height="100" fill="#8b5e3c" rx="2"/>
  <ellipse cx="82" cy="140" rx="12" ry="15" fill="#f5d0c5" stroke="#d4a090" stroke-width="1"/>
  <rect x="250" y="35" width="4" height="110" fill="#8b5e3c" rx="2"/>
  <ellipse cx="252" cy="145" rx="12" ry="15" fill="#f5d0c5" stroke="#d4a090" stroke-width="1"/>
  <!-- Subcutis -->
  <rect x="0" y="180" width="400" height="120" fill="#fff3cd" stroke="#f0d090" stroke-width="1"/>
  <text x="200" y="245" font-family="system-ui" font-size="13" fill="#8b5e3c" text-anchor="middle" font-weight="600">Subcutis (Fettgewebe)</text>
  <!-- Fettzellen -->
  <circle cx="40" cy="220" r="18" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="80" cy="230" r="16" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="120" cy="215" r="19" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="165" cy="230" r="17" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="210" cy="220" r="18" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="255" cy="232" r="16" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="300" cy="218" r="19" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <circle cx="345" cy="228" r="17" fill="#fff8e1" stroke="#f0d090" stroke-width="1"/>
  <!-- Titel -->
  <text x="10" y="295" font-family="system-ui" font-size="10" fill="#6e6e73">Gesunde Haut — Querschnitt</text>
</svg>