<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" fill="#f8f9fa"/>
  <!-- Hervorhebung: Oberer GI-Trakt -->
  <!-- Mund (hervorgehoben) -->
  <ellipse cx="200" cy="40" rx="28" ry="14" fill="#e74c3c" opacity="0.3"/>
  <ellipse cx="200" cy="40" rx="25" ry="12" fill="#f5c6c6" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="245" y="44" font-family="system-ui" font-size="11" fill="#e74c3c" font-weight="700">Mund</text>
  <!-- Speiseroehre (hervorgehoben) -->
  <path d="M200 52 L200 120" stroke="#e74c3c" stroke-width="14" stroke-linecap="round" opacity="0.2"/>
  <path d="M200 52 L200 120" stroke="#e8a0a0" stroke-width="12" stroke-linecap="round"/>
  <path d="M200 52 L200 120" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="245" y="90" font-family="system-ui" font-size="11" fill="#e74c3c" font-weight="700">Speiseröhre</text>
  <!-- Magen (hervorgehoben) -->
  <path d="M180 120 Q140 140, 150 180 Q160 220, 200 220 Q240 220, 240 180 Q240 140, 220 120 Z" fill="#e74c3c" opacity="0.15"/>
  <path d="M180 120 Q140 140, 150 180 Q160 220, 200 220 Q240 220, 240 180 Q240 140, 220 120 Z" fill="#f5d5d5" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="170" y="175" font-family="system-ui" font-size="12" fill="#e74c3c" font-weight="700">Magen</text>
  <!-- Duodenum (hervorgehoben) -->
  <path d="M200 220 Q240 230, 250 260 Q260 290, 230 290" stroke="#e74c3c" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.2"/>
  <path d="M200 220 Q240 230, 250 260 Q260 290, 230 290" stroke="#e8c4a0" stroke-width="10" stroke-linecap="round" fill="none"/>
  <text x="265" y="265" font-family="system-ui" font-size="10" fill="#e74c3c" font-weight="700">Duodenum</text>
  <!-- Rest ausgegraut -->
  <path d="M230 290 Q180 300, 160 310 Q140 320, 170 330 Q200 340, 230 330 Q260 320, 240 340 Q220 360, 180 350 Q140 340, 160 360" stroke="#d0d0d0" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M100 400 L100 280 Q100 240, 140 240 L260 240 Q300 240, 300 280 L300 400 Q300 430, 260 430 L140 430 Q100 430, 100 400" stroke="#d0d0d0" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M200 430 L200 470" stroke="#d0d0d0" stroke-width="10" stroke-linecap="round"/>
  <!-- Leber -->
  <path d="M80 130 Q60 120, 70 150 Q80 180, 130 180 Q150 180, 150 160 Q150 140, 130 130 Z" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="85" y="158" font-family="system-ui" font-size="9" fill="#e74c3c" font-weight="600">Leber</text>
  <!-- Badge -->
  <rect x="10" y="10" width="140" height="22" rx="11" fill="#e74c3c"/>
  <text x="80" y="25" font-family="system-ui" font-size="10" fill="white" text-anchor="middle" font-weight="700">Oberer GI-Trakt</text>
  <text x="200" y="495" font-family="system-ui" font-size="10" fill="#6e6e73" text-anchor="middle">Oberer Gastrointestinaltrakt</text>
</svg>