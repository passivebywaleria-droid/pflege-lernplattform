  <path d="M260 240 Q300 240, 300 280 L300 400" stroke="#30D158" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.2"/>
  <path d="M260 240 Q300 240, 300 280 L300 400" stroke="#d4a070" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M300 400 Q300 430, 260 430 L140 430 Q100 430, 100 400" stroke="#d4a070" stroke-width="14" stroke-linecap="round" fill="none"/>
  <text x="40" y="320" font-family="system-ui" font-size="11" fill="#30D158" font-weight="700">Dickdarm</text>
  <!-- Rektum (hervorgehoben) -->
