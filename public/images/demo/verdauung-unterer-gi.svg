  <text x="80" y="25" font-family="system-ui" font-size="10" fill="white" text-anchor="middle" font-weight="700">Unterer GI-Trakt</text>
  <text x="200" y="495" font-family="system-ui" font-size="10" fill="#6e6e73" text-anchor="middle">Unterer Gastrointestinaltrakt</text>
