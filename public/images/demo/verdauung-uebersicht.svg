<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" fill="#f8f9fa"/>
  <!-- Mund -->
  <ellipse cx="200" cy="40" rx="25" ry="12" fill="#f5c6c6" stroke="#c0392b" stroke-width="1.5"/>
  <text x="245" y="44" font-family="system-ui" font-size="10" fill="#1d1d1f" font-weight="600">Mund</text>
  <!-- Speiseroehre -->
  <path d="M200 52 L200 120" stroke="#e8a0a0" stroke-width="12" stroke-linecap="round"/>
  <path d="M200 52 L200 120" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="245" y="90" font-family="system-ui" font-size="10" fill="#1d1d1f">Speiseröhre</text>
  <!-- Magen -->
  <path d="M180 120 Q140 140, 150 180 Q160 220, 200 220 Q240 220, 240 180 Q240 140, 220 120 Z" fill="#f5d5d5" stroke="#c0392b" stroke-width="1.5"/>
  <text x="175" y="175" font-family="system-ui" font-size="11" fill="#c0392b" font-weight="600">Magen</text>
  <!-- Duodenum -->
  <path d="M200 220 Q240 230, 250 260 Q260 290, 230 290" stroke="#e8c4a0" stroke-width="10" stroke-linecap="round" fill="none"/>
  <text x="265" y="265" font-family="system-ui" font-size="9" fill="#1d1d1f">Duodenum</text>
  <!-- Duenndarm -->
  <path d="M230 290 Q180 300, 160 310 Q140 320, 170 330 Q200 340, 230 330 Q260 320, 240 340 Q220 360, 180 350 Q140 340, 160 360" stroke="#f0c090" stroke-width="8" stroke-linecap="round" fill="none"/>
  <text x="270" y="340" font-family="system-ui" font-size="10" fill="#1d1d1f">Dünndarm</text>
  <!-- Dickdarm -->
  <path d="M100 400 L100 280 Q100 240, 140 240" stroke="#d4a070" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M140 240 L260 240" stroke="#d4a070" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M260 240 Q300 240, 300 280 L300 400" stroke="#d4a070" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M300 400 Q300 430, 260 430 L140 430 Q100 430, 100 400" stroke="#d4a070" stroke-width="14" stroke-linecap="round" fill="none"/>
  <text x="50" y="320" font-family="system-ui" font-size="10" fill="#8b6914" font-weight="600">Dickdarm</text>
  <!-- Rektum -->
  <path d="M200 430 L200 470" stroke="#c4905a" stroke-width="10" stroke-linecap="round"/>
  <text x="220" y="460" font-family="system-ui" font-size="10" fill="#1d1d1f">Rektum</text>
  <!-- Leber -->
  <path d="M80 130 Q60 120, 70 150 Q80 180, 130 180 Q150 180, 150 160 Q150 140, 130 130 Z" fill="#c0392b" opacity="0.2" stroke="#c0392b" stroke-width="1"/>
  <text x="85" y="158" font-family="system-ui" font-size="9" fill="#c0392b">Leber</text>
  <!-- Pankreas -->
  <ellipse cx="200" cy="240" rx="40" ry="8" fill="#ffeaa7" stroke="#f39c12" stroke-width="1"/>
  <text x="170" y="244" font-family="system-ui" font-size="8" fill="#f39c12">Pankreas</text>
  <!-- Titel -->
  <text x="200" y="495" font-family="system-ui" font-size="10" fill="#6e6e73" text-anchor="middle">Verdauungssystem — Übersicht</text>
</svg>