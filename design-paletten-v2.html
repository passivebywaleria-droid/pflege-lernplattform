<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', system-ui, sans-serif;
    background: #faf8f5;
    color: #2d2a26;
    padding: 40px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; color: #2d2a26; }
  .subtitle { color: #8a8279; font-size: 14px; margin-bottom: 32px; line-height: 1.6; }

  .brief {
    background: #fff;
    border: 1px solid #e8e2da;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 36px;
  }
  .brief h2 { font-size: 14px; font-weight: 600; color: #8a8279; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .brief-items { display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px; color: #5c574f; }
  .brief-item { display: flex; align-items: center; gap: 8px; }
  .brief-dot { width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(640px, 1fr));
    gap: 24px;
  }

  .palette-card {
    background: #fff;
    border: 1px solid #e8e2da;
    border-radius: 16px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .palette-card:hover { box-shadow: 0 8px 30px rgba(45,42,38,0.06); }

  .palette-header {
    padding: 20px 24px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .palette-number { font-size: 11px; font-weight: 600; color: #b5ae a5; text-transform: uppercase; letter-spacing: 0.06em; }
  .palette-name { font-size: 17px; font-weight: 700; margin-top: 3px; color: #2d2a26; }
  .palette-desc { font-size: 12px; color: #8a8279; margin-top: 2px; font-weight: 400; }

  .palette-tags { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: #f5f1ec; color: #8a8279; font-weight: 500; }

  .color-strip {
    display: flex;
    height: 44px;
    margin: 0 24px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.05);
  }
  .color-strip div { flex: 1; position: relative; cursor: pointer; }
  .color-strip div:hover::after {
    content: attr(data-hex);
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #8a8279;
    font-family: monospace;
    white-space: nowrap;
    background: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid #e8e2da;
    z-index: 10;
  }

  .color-labels { display: flex; margin: 5px 24px 0; }
  .color-labels span { flex: 1; font-size: 9px; color: #b5aea5; text-align: center; font-weight: 500; }

  .preview-area {
    margin: 22px 24px;
    padding: 20px;
    border-radius: 12px;
    min-height: 190px;
  }
  .preview-area svg { width: 100%; height: auto; }

  .palette-footer {
    padding: 0 24px 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .font-sample { line-height: 1.5; }
  .font-sample strong {
    display: block;
    font-size: 10px;
    color: #b5aea5;
    font-weight: 500;
    margin-bottom: 1px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 20px 12px; }
  }
</style>
</head>
